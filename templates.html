<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Templates — CaseCraft</title>
    <meta name="description"
        content="Browse 30+ free iPhone case design templates across 10 categories including Neon, Marble, Luxury, and Cyberpunk." />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>" />
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <div class="stars-bg" aria-hidden="true"></div>

    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="nav-brand"><span class="brand-icon">📱</span><span class="brand-glow">CaseCraft</span></div>
        <ul class="nav-links" role="list">
            <li><a href="index.html">Home</a></li>
            <li><a href="app.html">Editor</a></li>
            <li><a href="templates.html" class="active" aria-current="page">Templates</a></li>
            <li><a href="gallery.html">My Designs</a></li>
            <li><a href="help.html">Help</a></li>
        </ul>
        <div class="nav-cta"><a href="app.html" class="btn btn-primary">🚀 Open Editor</a></div>
    </nav>

    <main class="page-wrap">
        <section class="section" aria-labelledby="templates-heading">
            <div class="section-header">
                <h1 id="templates-heading">Design Templates</h1>
                <p>30+ premade templates across 10 categories. Click any template to open it in the editor.</p>
            </div>

            <!-- Toolbar -->
            <div class="templates-toolbar">
                <input type="search" id="templateSearch" placeholder="Search templates…"
                    aria-label="Search templates" />
                <a href="app.html" class="btn btn-primary">🎨 Open Editor</a>
            </div>

            <!-- Category Filter -->
            <div class="cat-filter" role="group" aria-label="Filter by category">
                <button class="cat-btn active" data-cat="All">All</button>
                <button class="cat-btn" data-cat="Minimal">Minimal</button>
                <button class="cat-btn" data-cat="Neon">Neon</button>
                <button class="cat-btn" data-cat="Luxury">Luxury</button>
                <button class="cat-btn" data-cat="Cyberpunk">Cyberpunk</button>
                <button class="cat-btn" data-cat="Marble">Marble</button>
                <button class="cat-btn" data-cat="Abstract">Abstract</button>
                <button class="cat-btn" data-cat="Nature">Nature</button>
                <button class="cat-btn" data-cat="Gradient">Gradient</button>
                <button class="cat-btn" data-cat="Tech">Tech</button>
                <button class="cat-btn" data-cat="Typography">Typography</button>
            </div>

            <!-- Grid -->
            <div id="templateGrid" class="template-grid" role="list"></div>
        </section>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="footer-links">
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
            <a href="help.html">Help</a>
        </div>
    </footer>

    <script src="js/models.js"></script>
    <script src="js/templates.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/editor.js"></script>

    <script>
        (function () {
            const grid = document.getElementById('templateGrid');
            const search = document.getElementById('templateSearch');
            let currentCat = 'All';
            let currentQuery = '';

            function getFiltered() {
                let list = window.CASE_TEMPLATES;
                if (currentCat !== 'All') list = list.filter(t => t.category === currentCat);
                if (currentQuery) {
                    const q = currentQuery.toLowerCase();
                    list = list.filter(t => t.name.toLowerCase().includes(q) || t.category.toLowerCase().includes(q));
                }
                return list;
            }

            function bgCss(bg) {
                if (!bg) return '#1A1A2E';
                if (bg.type === 'solid') return bg.color;
                if (bg.type === 'gradient' && bg.stops && bg.stops.length >= 2) {
                    const stops = bg.stops.map(s => `${s.color} ${Math.round(s.pos * 100)}%`).join(',');
                    return `linear-gradient(${bg.angle || 135}deg, ${stops})`;
                }
                return '#1A1A2E';
            }

            function render() {
                const list = getFiltered();
                grid.innerHTML = '';
                if (list.length === 0) {
                    grid.innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:40px;">No templates found.</p>';
                    return;
                }
                list.forEach(t => {
                    const card = document.createElement('article');
                    card.className = 'template-card';
                    card.setAttribute('role', 'listitem');
                    card.setAttribute('tabindex', '0');
                    card.setAttribute('aria-label', `${t.name} template — ${t.category} category. Click to open in editor.`);

                    // Build a CSS background preview
                    const bg = bgCss(t.background);
                    const isBgString = typeof bg === 'string';

                    // First layer text preview
                    const textLayer = (t.layers || []).find(l => l.type === 'text' && l.text);
                    const textPreview = textLayer ? `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:${Math.max(8, (textLayer.size || 24) * 0.45)}px;font-weight:${textLayer.bold ? 'bold' : 'normal'};color:${textLayer.color || '#fff'};text-align:center;padding:8px;word-break:break-word;${textLayer.glow ? 'text-shadow:0 0 8px ' + textLayer.glow.color : ''};">${textLayer.text.replace(/\n/g, '<br/>')}</div>` : '';

                    card.innerHTML = `
        <div class="template-thumb" style="background:${isBgString ? bg : '#1A1A2E'};">
          ${textPreview}
          <div class="template-overlay" aria-hidden="true">
            <span style="color:#fff;font-size:0.82rem;font-weight:600;background:rgba(0,0,0,0.6);padding:6px 12px;border-radius:8px;">Use Template →</span>
          </div>
        </div>
        <div class="template-info">
          <div class="template-name">${escapeHtml(t.name)}</div>
          <div class="template-cat">${escapeHtml(t.category)}</div>
        </div>`;

                    function openTemplate() {
                        // Save template choice and navigate to editor
                        sessionStorage.setItem('pending_template', t.id);
                        window.location.href = 'app.html?template=' + encodeURIComponent(t.id);
                    }
                    card.addEventListener('click', openTemplate);
                    card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openTemplate(); } });
                    grid.appendChild(card);
                });
            }

            // Auto-apply template when opened from templates page
            // (handled in app.js via URL param, but we also pre-select in the editor's quick select)

            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCat = btn.dataset.cat;
                    render();
                });
            });

            search.addEventListener('input', () => { currentQuery = search.value.trim(); render(); });

            function escapeHtml(s) {
                return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
            }

            render();
        })();

        // Handle template URL param in editor
        (function () {
            const params = new URLSearchParams(location.search);
            const tId = params.get('template');
            if (tId && window.CASE_TEMPLATES) {
                // If loaded directly in templates page, no action needed (would only make sense in app.html)
            }
        })();
    </script>
</body>

</html>
